<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Subscriptions - Price List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="text-gray-900">

    <!-- Header Section -->
    <header class="bg-white border-b border-gray-200 py-8 px-4 text-center">
        <h1 class="text-3xl md: text-4xl font-bold text-blue-900 mb-2">Cozu Store</h1>
        <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-2">Daftar Harga Langganan</h1>
        <p class="text-gray-500 max-w-lg mx-auto">Pilih aplikasi favoritmu dan nikmati fitur premium dengan harga terbaik dan proses cepat.</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <!-- App Selection Tabs (Horizontal Scroll on Mobile) -->
        <div class="flex overflow-x-auto no-scrollbar border-b border-gray-200 mb-8 space-x-8 justify-start md:justify-center">
            <div id="app-tabs" class="flex space-x-6 pb-2">
                <!-- Tabs will be generated here -->
            </div>
        </div>

        <!-- Pricing Cards Container -->
        <div id="pricing-container" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Cards will be generated here -->
        </div>

        <!-- Contact Section -->
        <div class="mt-20 text-center bg-indigo-600 rounded-2xl p-10 text-white shadow-xl">
            <h2 class="text-2xl font-bold mb-4">Butuh Aplikasi Lain?</h2>
            <p class="mb-6 opacity-90 text-lg">Hubungi admin untuk request aplikasi</p>
            <a href="https://wa.me/6287862481038" class="bg-white text-indigo-600 px-8 py-3 rounded-full font-bold hover:bg-gray-100 transition-colors inline-block">
                <i class="fab fa-whatsapp mr-2"></i> Chat WhatsApp Sekarang
            </a>
        </div>
    </main>

    <footer class="py-10 text-center text-gray-400 text-sm">
        &copy; 2026 Cozu Store. All rights reserved.
    </footer>
    <script src="script.js"></script>
</body>
</html>
